<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}積みゲーデータベース{% endblock title %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
          rel="stylesheet" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="{% url 'tsumigee_database:game_list' %}">積みゲーDB</a>
        <div class="navbar-nav ms-3">
          <a class="nav-link" href="{% url 'tsumigee_database:game_list' %}">ゲーム</a>
          <a class="nav-link" href="{% url 'tsumigee_database:maker_list' %}">メーカー</a>
          <a class="nav-link" href="{% url 'tsumigee_database:hard_list' %}">ハード</a>
        </div>
      </div>
    </nav>
    <main class="container mt-4">
      {% block content %}
      {% endblock content %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>document.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(el => new bootstrap.Tooltip(el))</script>
    {% block scripts %}
    {% endblock scripts %}
  </body>
</html>
