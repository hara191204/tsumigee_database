<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      {% block page_title %}
      {% endblock page_title %}
    積みゲーを積むゲーム</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
          rel="stylesheet" />
    <style>
      thead th {
        position: sticky;
        top: 0;
        z-index: 1;
      }
    </style>
    {% block extra_styles %}
    {% endblock extra_styles %}
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <div class="d-flex align-items-center">
          <a class="navbar-brand" href="{% url 'tsumigee_database:game_list' %}">積みゲーを積むゲーム</a>
          <div class="navbar-nav flex-row gap-3">
            <a class="nav-link" href="{% url 'tsumigee_database:game_list' %}">ゲーム</a>
            <a class="nav-link" href="{% url 'tsumigee_database:maker_list' %}">メーカー</a>
            <a class="nav-link" href="{% url 'tsumigee_database:hard_list' %}">ハード</a>
          </div>
        </div>
        <div class="ms-auto">
          {% block navbar_actions %}
          {% endblock navbar_actions %}
        </div>
      </div>
    </nav>
    <main class="container mt-4">
      {% block content %}
      {% endblock content %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>document.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(el => new bootstrap.Tooltip(el))</script>
    {% block scripts %}
    {% endblock scripts %}
  </body>
</html>
