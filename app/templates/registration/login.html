<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ログイン | 積みゲーを積むゲーム</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet" />
  </head>
  <body class="bg-dark">
    <div class="min-vh-100 d-flex align-items-center justify-content-center">
      <div class="card shadow" style="width: 360px">
        <div class="card-body p-4">
          <h1 class="h5 mb-4 text-center">積みゲーを積むゲーム</h1>
          <form method="post">
            {% csrf_token %}
            {% if form.errors %}
              <div class="alert alert-danger py-2 small">ユーザー名またはパスワードが正しくありません。</div>
            {% endif %}
            <div class="mb-3">
              <label for="id_username" class="form-label">ユーザー名</label>
              <input type="text"
                     name="username"
                     id="id_username"
                     class="form-control"
                     autofocus
                     autocomplete="username" />
            </div>
            <div class="mb-4">
              <label for="id_password" class="form-label">パスワード</label>
              <input type="password"
                     name="password"
                     id="id_password"
                     class="form-control"
                     autocomplete="current-password" />
            </div>
            <button type="submit" class="btn btn-primary w-100">ログイン</button>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
