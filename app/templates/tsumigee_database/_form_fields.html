{% for field in form %}
  <div class="mb-3">
    <label for="{{ field.id_for_label }}" class="form-label fw-semibold">{{ field.label }}</label>
    <div>
      {% if field.field.widget.input_type == "checkbox" %}
        <div class="form-check">{{ field }}</div>
      {% else %}
        {{ field }}
      {% endif %}
    </div>
    {% if field.errors %}
      <div class="text-danger small mt-1">{{ field.errors }}</div>
    {% endif %}
  </div>
{% endfor %}
