{% extends "base.html" %}
{% block page_title %}ゲーム削除 | {% endblock page_title %}
{% block content %}
  <h1 class="h3 mb-3">ゲーム削除</h1>
  <p>
    「<strong>{{ game.title }}</strong>」を削除しますか？この操作は取り消せません。
  </p>
  <form method="post">
    {% csrf_token %}
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-danger">Delete</button>
      <a href="{% url 'tsumigee_database:game_detail' game.pk %}"
         class="btn btn-secondary">Cancel</a>
    </div>
  </form>
{% endblock content %}
