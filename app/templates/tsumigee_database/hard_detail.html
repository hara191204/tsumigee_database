{% extends "base.html" %}
{% block page_title %}{{ object.name }} | {% endblock page_title %}
{% block content %}
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h3">{{ object.name }}</h1>
    <div class="d-flex gap-2">
      <a href="{% url 'tsumigee_database:hard_update' object.pk %}"
         class="btn btn-outline-secondary btn-sm">編集</a>
      <a href="{% url 'tsumigee_database:hard_delete' object.pk %}"
         class="btn btn-outline-danger btn-sm">削除</a>
    </div>
  </div>
  <table class="table table-bordered w-auto">
    <tbody>
      <tr>
        <th class="table-secondary">名前</th>
        <td>{{ object.name }}</td>
      </tr>
      <tr>
        <th class="table-secondary">登録日時</th>
        <td>{{ object.created_at }}</td>
      </tr>
      <tr>
        <th class="table-secondary">更新日時</th>
        <td>{{ object.updated_at }}</td>
      </tr>
    </tbody>
  </table>
  <a href="{% url 'tsumigee_database:hard_list' %}"
     class="btn btn-secondary mt-2">一覧に戻る</a>
{% endblock content %}
