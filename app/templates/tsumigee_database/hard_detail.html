{% extends "base.html" %}
{% block page_title %}{{ object.name }} | {% endblock page_title %}
{% block content %}
  <h1 class="h3 mb-3">{{ object.name }}</h1>
  <table class="table table-bordered w-auto">
    <tbody>
      <tr>
        <th class="table-secondary">名前</th>
        <td>{{ object.name }}</td>
      </tr>
      <tr>
        <th class="table-secondary">登録日時</th>
        <td>{{ object.created_at }}</td>
      </tr>
      <tr>
        <th class="table-secondary">更新日時</th>
        <td>{{ object.updated_at }}</td>
      </tr>
    </tbody>
  </table>
  <div class="d-flex gap-2 mt-2">
    <a href="{% url 'tsumigee_database:hard_update' object.pk %}"
       class="btn btn-outline-secondary btn-sm">Edit</a>
    <form method="post"
          action="{% url 'tsumigee_database:hard_delete' object.pk %}"
          class="d-inline"
          onsubmit="return confirm('「{{ object.name }}」を削除しますか？この操作は取り消せません。')">
      {% csrf_token %}
      <button type="submit" class="btn btn-outline-danger btn-sm">Delete</button>
    </form>
  </div>
{% endblock content %}
