{% extends "base.html" %}
{% block page_title %}ハード削除 | {% endblock page_title %}
{% block content %}
  <h1 class="h3 mb-3">ハード削除</h1>
  <p>
    「<strong>{{ object.name }}</strong>」を削除しますか？この操作は取り消せません。
  </p>
  <form method="post">
    {% csrf_token %}
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-danger">削除する</button>
      <a href="{% url 'tsumigee_database:hard_list' %}"
         class="btn btn-secondary">キャンセル</a>
    </div>
  </form>
{% endblock content %}
