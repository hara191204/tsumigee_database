{% extends "base.html" %}
{% block page_title %}ゲーム{{ action }} | {% endblock page_title %}
{% block content %}
  <h1 class="h3 mb-3">ゲーム{{ action }}</h1>
  <form method="post" class="col-lg-6" novalidate>
    {% csrf_token %}
    {% include "tsumigee_database/_form_fields.html" %}
    <div class="d-flex gap-2 mt-4">
      <button type="submit" class="btn btn-primary">Save</button>
      <a href="{% if object %}{% url 'tsumigee_database:game_detail' object.pk %}{% else %}{% url 'tsumigee_database:game_list' %}{% endif %}"
         class="btn btn-secondary">Cancel</a>
    </div>
  </form>
{% endblock content %}
{% block scripts %}
  <script>
    const clearStatus = document.getElementById('id_clear_status')
    const clearedAt = document.getElementById('id_cleared_at')
    clearStatus.addEventListener('change', () => {
      if (clearStatus.value === 'clear') {
        if (!clearedAt.value) {
          const d = new Date()
          d.setMinutes(d.getMinutes() - d.getTimezoneOffset())
          clearedAt.value = d.toISOString().slice(0, 10)
        }
      } else {
        clearedAt.value = ''
      }
    })

    // プレイ可能ハード：未設定時はデフォルトでロック
    const playHard = document.getElementById('id_play_hard')
    const form = playHard.closest('form')
    if (!playHard.value) playHard.disabled = true

    const toggleBtn = document.createElement('button')
    toggleBtn.type = 'button'
    toggleBtn.className = 'btn btn-sm btn-outline-secondary mt-1'
    const updateBtn = () => {
      toggleBtn.innerHTML = playHard.disabled
        ? '<i class="fa-solid fa-lock fa-xs"></i> 変更する'
        : '<i class="fa-solid fa-lock-open fa-xs"></i> ロックする'
    }
    updateBtn()
    playHard.insertAdjacentElement('afterend', toggleBtn)

    toggleBtn.addEventListener('click', () => {
      playHard.disabled = !playHard.disabled
      if (playHard.disabled) playHard.value = ''
      updateBtn()
    })

    // disabled のままだと値が送信されないため送信直前に解除
    form.addEventListener('submit', () => { playHard.disabled = false })
  </script>
{% endblock scripts %}
