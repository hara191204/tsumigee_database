{% extends "base.html" %}
{% block title %}ハード一覧 | 積みゲーDB{% endblock title %}
{% block content %}
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h3">ハード一覧</h1>
    <a href="{% url 'tsumigee_database:hard_create' %}"
       class="btn btn-primary">追加</a>
  </div>
  <table class="table table-hover">
    <thead class="table-dark">
      <tr>
        <th>名前</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      {% for hard in object_list %}
        <tr>
          <td>{{ hard.name }}</td>
          <td class="text-end">
            <a href="{% url 'tsumigee_database:hard_update' hard.pk %}"
               class="btn btn-outline-secondary btn-sm">編集</a>
            <a href="{% url 'tsumigee_database:hard_delete' hard.pk %}"
               class="btn btn-outline-danger btn-sm">削除</a>
          </td>
        </tr>
      {% empty %}
        <tr>
          <td colspan="2" class="text-center text-muted">ハードが登録されていません</td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
{% endblock content %}
