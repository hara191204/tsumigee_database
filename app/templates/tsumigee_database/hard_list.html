{% extends "base.html" %}
{% block title %}ハード一覧 | 積みゲーDB{% endblock title %}
{% block content %}
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h3">ハード一覧</h1>
    <a href="{% url 'tsumigee_database:hard_create' %}"
       class="btn btn-primary">追加</a>
  </div>
  <table class="table table-hover">
    <thead class="table-dark">
      <tr>
        <th class="text-center">No.</th>
        <th>名前</th>
        <th class="text-center">操作</th>
      </tr>
    </thead>
    <tbody>
      {% for hard in object_list %}
        <tr>
          <td class="text-center text-muted">{{ forloop.counter }}</td>
          <td><a href="{% url 'tsumigee_database:hard_detail' hard.pk %}">{{ hard.name }}</a></td>
          <td class="text-center">
            <a href="{% url 'tsumigee_database:hard_update' hard.pk %}"
               class="btn btn-outline-secondary btn-sm"><i class="fa-solid fa-pen-to-square"></i></a>
          </td>
        </tr>
      {% empty %}
        <tr>
          <td colspan="3" class="text-center text-muted">ハードが登録されていません</td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
{% endblock content %}
